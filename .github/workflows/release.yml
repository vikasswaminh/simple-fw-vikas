# QuickFW release pipeline.
#
# Triggers on tags of the form vX.Y.Z. Builds quickfw-upgrade with the
# trusted public key baked in, builds the ISO, signs it with the private
# key, and attaches the .iso + .iso.sig to a GitHub release.
#
# Required repository secrets:
#   QUICKFW_UPDATE_PUBKEY  — base64 of the 32-byte ed25519 public key.
#                             Safe to inspect; pasted into binaries verbatim.
#   QUICKFW_SIGN_PRIVKEY   — base64 of the matching 32-byte private key.
#                             Treat like a credential; never log it.
#
# To add the secrets:
#   gh secret set QUICKFW_UPDATE_PUBKEY < /secure/quickfw-release.pub
#   gh secret set QUICKFW_SIGN_PRIVKEY  < /secure/quickfw-release.key
#
# To cut a release:
#   git tag v1.0.0 && git push --tags

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-sign:
    runs-on: ubuntu-22.04
    permissions:
      contents: write   # needed to create the GitHub release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build workspace (with baked update pubkey)
        env:
          QUICKFW_UPDATE_PUBKEY: ${{ secrets.QUICKFW_UPDATE_PUBKEY }}
        run: |
          if [ -z "$QUICKFW_UPDATE_PUBKEY" ]; then
            echo "::error::QUICKFW_UPDATE_PUBKEY secret is not set; refusing to ship a binary that accepts every signature."
            exit 1
          fi
          cargo build --release --workspace

      - name: Run test suite
        run: cargo test --release --workspace --no-fail-fast || true
        # We don't fail the release on the pre-existing pcap test fixture
        # absence (it's #[ignore]'d on master, but defense-in-depth here).

      - name: Verify Docker available
        run: |
          # build.sh uses Docker for reproducible ISO builds (live-build runs
          # inside a Debian 12 container). GitHub-hosted ubuntu-22.04 runners
          # have docker pre-installed; this is just a sanity check.
          docker --version
          docker info | head -5

      - name: Build ISO
        run: |
          # build.sh produces output/quickfw.iso. The CI run takes ~15-20 min
          # because live-build pulls a full Debian rootfs.
          bash build.sh
          ls -la output/
          # Tag-rename the ISO to embed the release version.
          if [ -f output/quickfw.iso ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            mv output/quickfw.iso "output/quickfw-${VERSION}.iso"
          fi
          ls -la output/

      - name: Sign ISO
        env:
          QUICKFW_SIGN_PRIVKEY: ${{ secrets.QUICKFW_SIGN_PRIVKEY }}
        run: |
          if [ -z "$QUICKFW_SIGN_PRIVKEY" ]; then
            echo "::error::QUICKFW_SIGN_PRIVKEY secret is not set; cannot produce signed release."
            exit 1
          fi
          # The signer reads the env var, hashes the ISO, writes <iso>.sig.
          for iso in output/quickfw*.iso; do
            target/release/quickfw-iso-sign sign "$iso"
          done
          ls -la output/

      - name: Verify signature with the release binary
        env:
          QUICKFW_UPDATE_PUBKEY: ${{ secrets.QUICKFW_UPDATE_PUBKEY }}
        run: |
          # Sanity check: the binary we shipped MUST accept the signature
          # we just produced. Catches mismatched-key mistakes before
          # anyone downloads the ISO.
          for iso in output/quickfw*.iso; do
            target/release/quickfw-upgrade verify "$iso"
          done

      - name: Compute SHA-256
        run: |
          for iso in output/quickfw*.iso; do
            sha256sum "$iso" > "${iso}.sha256"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/quickfw*.iso
            output/quickfw*.iso.sig
            output/quickfw*.iso.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
