<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickFW Firewall Appliance</title>
    <link rel="stylesheet" href="/styles.css?v=20260314">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1f36'/><path d='M16 4L6 9v8c0 5.5 4.3 10.7 10 12 5.7-1.3 10-6.5 10-12V9L16 4z' fill='%232563eb'/></svg>">
</head>
<body>
<div class="layout">

    <!-- Mobile hamburger -->
    <button class="hamburger-btn" onclick="QFW.toggleSidebar()" aria-label="Toggle menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="sidebar-backdrop" onclick="QFW.closeSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <svg class="brand-icon" viewBox="0 0 32 32" fill="none">
                <rect width="32" height="32" rx="6" fill="#2563eb"/>
                <path d="M16 5L7 10v7c0 5 3.8 9.7 9 11 5.2-1.3 9-6 9-11v-7L16 5z" fill="white"/>
            </svg>
            <div>
                <div class="brand-name">QuickFW</div>
                <div class="brand-sub">Firewall Appliance</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-label">Monitor</div>
            <a class="nav-item active" onclick="QFW.showPage('dashboard')" data-page="dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                Dashboard
            </a>
            <a class="nav-item" onclick="QFW.showPage('interfaces')" data-page="interfaces">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                Interfaces
            </a>
            <a class="nav-item" onclick="QFW.showPage('conntrack')" data-page="conntrack">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                Connections
            </a>

            <div class="nav-label">Security</div>
            <a class="nav-item" onclick="QFW.showPage('firewall')" data-page="firewall">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Firewall Rules
            </a>
            <a class="nav-item" onclick="QFW.showPage('nat')" data-page="nat">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
                NAT / Routing
            </a>

            <div class="nav-label">System</div>
            <a class="nav-item" onclick="QFW.showPage('settings')" data-page="settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                Settings
            </a>
            <a class="nav-item" onclick="QFW.showPage('account')" data-page="account">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                Account
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-footer-text">QuickFW Firewall Appliance</div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <div id="toast-container"></div>

        <!-- Login page (shown when not authenticated) -->
        <div id="login-page" class="login-page" style="display:none;">
            <div class="login-card">
                <svg class="login-icon" viewBox="0 0 32 32" fill="none">
                    <rect width="32" height="32" rx="6" fill="#2563eb"/>
                    <path d="M16 5L7 10v7c0 5 3.8 9.7 9 11 5.2-1.3 9-6 9-11v-7L16 5z" fill="white"/>
                </svg>
                <h1>QuickFW</h1>
                <p>Firewall Appliance</p>
                <form id="login-form" autocomplete="on">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="login-user" placeholder="admin" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-primary" style="width:100%;">Sign In</button>
                    <div id="login-error" class="login-error"></div>
                </form>
            </div>
        </div>

        <!-- Dashboard page (default) -->
        <div id="page-dashboard" class="page active"></div>
    </main>
</div>

<!-- Core (must be first) -->
<script src="/core.js?v=20260314"></script>

<!-- Pages -->
<script src="/dashboard.js?v=20260314"></script>
<script src="/interfaces.js?v=20260314"></script>
<script src="/firewall.js?v=20260314"></script>
<script src="/nat.js?v=20260314"></script>
<script src="/settings.js?v=20260314"></script>
<script src="/conntrack.js?v=20260314"></script>
<script src="/account.js?v=20260314"></script>
</body>
</html>
