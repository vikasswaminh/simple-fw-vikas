<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="QuickFW Firewall Dashboard" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>" />
    <title>QuickFW Dashboard</title>
    <style>
      /* Critical CSS - prevent flash */
      html, body {
        margin: 0;
        padding: 0;
        background-color: #0f172a;
        color: #f8fafc;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
      }
      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- App Container -->
      <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
          <div class="sidebar-header">
            <h1>🛡️ QuickFW</h1>
          </div>
          <nav class="sidebar-nav">
            <div id="nav-items" class="nav-items">
              <!-- Navigation items injected by JS -->
            </div>
          </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
          <!-- Header -->
          <header class="header">
            <h2 id="page-title" class="header-title">Dashboard</h2>
            <div class="header-actions">
              <span id="user-name">Admin</span>
              <button id="logout-btn" class="btn btn-secondary" title="Logout">
                Logout
              </button>
            </div>
          </header>

          <!-- Content Area -->
          <div id="app-content" class="content-area">
            <!-- Page content injected by router -->
          </div>
        </main>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
