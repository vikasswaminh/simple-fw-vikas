#!/usr/sbin/nft -f
flush ruleset

table inet quickfw {
    chain MGMT_SAFETY {
        type filter hook input priority -200; policy accept;
        tcp dport { 22, 443, 3000 } counter accept comment "management access"
        meta l4proto icmp counter accept
        meta l4proto icmpv6 counter accept
        # Mark management traffic so quickfw_input skips it
        tcp dport { 22, 443, 3000 } meta mark set 0x1
        meta l4proto icmp meta mark set 0x1
        meta l4proto icmpv6 meta mark set 0x1
    }
    chain quickfw_input {
        type filter hook input priority -10; policy drop;
        # Skip packets already accepted by MGMT_SAFETY
        meta mark 0x1 accept
        ct state established,related accept
        ct state invalid drop
        iifname "lo" accept
    }
    chain quickfw_forward {
        type filter hook forward priority -10; policy drop;
        ct state established,related accept
        ct state invalid drop
    }
    chain quickfw_output {
        type filter hook output priority -10; policy accept;
    }
}
